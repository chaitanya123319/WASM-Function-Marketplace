services:
  # ─────────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wasm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - wasm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wasm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - wasm-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wasm-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    networks:
      - wasm-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────
  # Contributor Node (Go + Wazero)
  # ─────────────────────────────────────────────────
  node:
    build:
      context: ./contributor-node
      dockerfile: Dockerfile
    container_name: wasm-node
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:8000
    networks:
      - wasm-net
    depends_on:
      - redis
      - backend

  # ─────────────────────────────────────────────────
  # React Frontend (Vite + TailwindCSS)
  # ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wasm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - wasm-net
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  wasm-net:
    driver: bridge
